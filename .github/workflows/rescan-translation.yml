name: Rescan Translation

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  rescan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install gettext
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext

      - name: Run rescan translation script
        run: |
          chmod +x .github/rescan-translation.sh
          ./.github/rescan-translation.sh

      - name: Commit and push updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          if [ -n "$(git status --porcelain po/)" ]; then
            git add po/
            git commit -m "chore: automatic translation rescan and update"
            git push
          else
            echo "No translation changes detected."
          fi
